name: "Python package: build, lint, and test"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions: {}

jobs:

  licenses:

    name: Check for REUSE specification compliance
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check REUSE compliance
        uses: fsfe/reuse-action@v6

  build_lint_test:

    env:
      PYTHON_VERSION_COVERAGE_UPLOAD: "3.11"


    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
    
    permissions:
      contents: read

    name: "Python ${{ matrix.python-version }}: build, lint, test"
    runs-on: ubuntu-latest
    
    steps:

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and tooling 
        id: install
        run: |
          python -m pip install --group "${GITHUB_WORKSPACE}/pyproject.toml:dev" "${GITHUB_WORKSPACE}"

      - name: Lint
        if: ${{ always() && steps.install.conclusion == 'success' }}
        run: |
          ruff check

      - name: Format
        if: always() && steps.install.conclusion == 'success'
        run: |
          ruff format --check

      - name: Test with coverage
        id: coverage
        if: always() && steps.install.conclusion == 'success'
        continue-on-error: true
        run: |
          pytest --verbose --cov=netham --cov-report=term-missing --cov-report=xml --cov-report=html "${GITHUB_WORKSPACE}/tests"

      - name: Upload coverage artifact
        if: |
          always() &&
          matrix.python-version == env.PYTHON_VERSION_COVERAGE_UPLOAD &&
          steps.coverage.conclusion == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: html-coverage-report-${{ github.run_id }}
          path: htmlcov

      - name: Upload coverage artifact
        if: |
          always() &&
          matrix.python-version == env.PYTHON_VERSION_COVERAGE_UPLOAD &&
          steps.coverage.conclusion == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: xml-coverage-report-${{ github.run_id }} 
          path: coverage.xml
